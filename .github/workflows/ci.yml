name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API (check mode)
        run: npm run lint:api:check

      - name: Test API
        run: npm run test -- --watchman=false --runInBand

      - name: Build API
        run: npm run build:api

  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Lint web
        run: npm --prefix apps/web run lint

      - name: Typecheck web
        run: npm --prefix apps/web run typecheck

      - name: Test web
        run: npm --prefix apps/web run test

      - name: Build web
        run: npm --prefix apps/web run build
